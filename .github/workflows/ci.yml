name: CI

# Layer 3 of the security model — the unbypassable gate.
# Re-runs the same secret/path checks as the local hooks, on GitHub's servers,
# where --no-verify can't skip them. Lint / typecheck / test jobs are added in
# Stage 2 once those tools exist; branch protection should require this workflow.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secrets-and-paths:
    name: Secret scan + forbidden paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Block forbidden paths (planning/, real .env)
        run: |
          FORBIDDEN=$(git ls-files \
            | grep -E '^planning/|(^|/)\.env' \
            | grep -v -E '(^|/)\.env\.example$' \
            || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "::error::Forbidden files are tracked in git:"
            echo "$FORBIDDEN"
            exit 1
          fi

      - name: secretlint (scan all tracked files)
        run: git ls-files -z | xargs -0 npx secretlint --secretlintrc .secretlintrc.json
