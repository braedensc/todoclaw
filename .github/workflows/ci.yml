name: CI

# Layer 3 of the security/quality model — the unbypassable gate (--no-verify can't skip it).
# Four parallel jobs run on every push to main and every PR:
#   - "Secret scan + forbidden paths" — secretlint + planning/.env path gate (Stage 1)
#   - "Lint"      — ESLint + Prettier check        (Stage 2 PR #2 tooling)
#   - "Typecheck" — tsc -b                          (Stage 2 PR #2 tooling)
#   - "Test"      — Vitest (unit + component)       (Stage 2 PR #2 tooling)
# Each job's `name:` IS the required-status-check context. After this PR merges, add
# "Lint", "Typecheck", and "Test" to main's required checks (see docs/SERVICES.md /
# ADR-0010) — only once they've reported, or open PRs would wedge waiting on them.

on:
  push:
    branches: [main]
  # Run on every PR regardless of base branch — so stacked PRs (base != main) are gated too,
  # not just PRs that target main directly.
  pull_request:

permissions:
  contents: read

jobs:
  secrets-and-paths:
    name: Secret scan + forbidden paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Block forbidden paths (planning/, real .env)
        run: |
          FORBIDDEN=$(git ls-files \
            | grep -E '^planning/|(^|/)\.env' \
            | grep -v -E '(^|/)\.env\.example$' \
            || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "::error::Forbidden files are tracked in git:"
            echo "$FORBIDDEN"
            exit 1
          fi

      - name: secretlint (scan all tracked files)
        run: git ls-files -z | xargs -0 npx secretlint --secretlintrc .secretlintrc.json

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (check)
        run: npm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: tsc -b
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vitest (unit + component)
        run: npm test

  # Playwright smoke. NOT a required check yet (promote once it's proven stable) so a flaky
  # browser run can't wedge main. chromium-only + dummy Supabase env (see playwright.config.ts).
  e2e:
    name: E2E (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke
        run: npm run test:e2e
