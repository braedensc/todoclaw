name: CI

# Layer 3 of the security/quality model — the unbypassable gate (--no-verify can't skip it).
# Four parallel jobs run on every push to main and every PR:
#   - "Secret scan + forbidden paths" — secretlint + planning/.env path gate (Stage 1)
#   - "Lint"      — ESLint + Prettier check        (Stage 2 PR #2 tooling)
#   - "Typecheck" — tsc -b                          (Stage 2 PR #2 tooling)
#   - "Test"      — Vitest (unit + component)       (Stage 2 PR #2 tooling)
#   - "Deno"      — deno check + deno test (edge functions — the tree tsc/eslint skip)
# Each job's `name:` IS the required-status-check context. After this PR merges, add
# "Lint", "Typecheck", and "Test" to main's required checks (see docs/SERVICES.md /
# ADR-0010) — only once they've reported, or open PRs would wedge waiting on them.

on:
  push:
    branches: [main]
  # Run on every PR regardless of base branch — so stacked PRs (base != main) are gated too,
  # not just PRs that target main directly. `labeled`/`unlabeled` are included so the
  # "Hooks change guard" below re-evaluates the moment a `hooks-change` label is added or
  # removed (the default PR activity types — opened/synchronize/reopened — don't cover labels).
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  secrets-and-paths:
    name: Secret scan + forbidden paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Block forbidden paths (planning/, real .env)
        run: |
          FORBIDDEN=$(git ls-files \
            | grep -E '^planning/|(^|/)\.env' \
            | grep -v -E '(^|/)\.env\.example$' \
            || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "::error::Forbidden files are tracked in git:"
            echo "$FORBIDDEN"
            exit 1
          fi

      - name: secretlint (scan all tracked files)
        run: git ls-files -z | xargs -0 npx secretlint --secretlintrc .secretlintrc.json

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (check)
        run: npm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: tsc -b
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vitest (unit + component)
        run: npm test

  # Deno edge-function gate. The frontend jobs above SKIP supabase/functions/ (tsc -b + eslint
  # ignore that tree — it runs Deno, not Node), so until now nothing in CI type-checked or tested
  # the server-side capability/guardrail/prompt logic — the exact gap behind the "three-readers"
  # class of bugs. This job closes it: `deno check` type-checks the shared modules + every function
  # entrypoint, and `deno task test` runs the 213-test suite. Verified locally before adding.
  deno:
    name: Deno
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check (deno check — shared modules, capabilities + function entrypoints)
        working-directory: supabase/functions
        run: deno check _shared/*.ts _shared/capabilities/*.ts */index.ts

      - name: Deno unit tests
        working-directory: supabase/functions
        run: deno task test

  # Playwright smoke. NOT a required check yet (promote once it's proven stable) so a flaky
  # browser run can't wedge main. chromium-only + dummy Supabase env (see playwright.config.ts).
  e2e:
    name: E2E (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke
        run: npm run test:e2e

  # Migration guard — hard, deterministic feedback on the two mistakes that wedged the prod deploy
  # on 2026-07-09: a DUPLICATE migration version (schema_migrations PK collision) or an OUT-OF-ORDER
  # one (sorts before main's latest → `supabase db push` hard-stops and applies nothing further).
  # PR-only and compares against the freshly-fetched main tip, so a parallel branch that grabbed the
  # same/earlier timestamp fails HERE instead of silently after merge. See scripts/check-migrations.mjs.
  migration-guard:
    name: Migration guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch main (the base to compare against)
        run: git fetch --no-tags --depth=1 origin main

      - name: Check migration versions (no duplicates, newest-last)
        env:
          BASE_REF: FETCH_HEAD
        run: node scripts/check-migrations.mjs

  # GAP 1 (audit 2026-07-06) CI backstop. `.claude/settings.json` sets
  # defaultMode=bypassPermissions, so the PreToolUse hook is the only local runtime gate.
  # Even if that local guard is somehow disabled, a PR that changes the guard machinery
  # (.claude/hooks/** or .claude/settings.json) must not merge unnoticed — it has to carry
  # an explicit `hooks-change` label. This flag only becomes a real gate once branch
  # protection requires a review (required_approving_review_count >= 1, owner-set in the
  # GitHub UI) so a human actually sees it. PR-only (a push to main has no label context).
  hooks-change-guard:
    name: Hooks change guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require the 'hooks-change' label to edit hook/settings files
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")
          SENSITIVE=$(printf '%s\n' "$CHANGED" | grep -E '^\.claude/(hooks/|settings\.json$)' || true)
          if [ -z "$SENSITIVE" ]; then
            echo "No security-hook files changed — nothing to gate."
            exit 0
          fi
          echo "This PR modifies security-critical hook/settings files:"
          printf '  %s\n' $SENSITIVE
          for label in $LABELS; do
            if [ "$label" = "hooks-change" ]; then
              echo "OK: 'hooks-change' label present — change acknowledged."
              exit 0
            fi
          done
          echo "::error::This PR changes .claude/hooks/** or .claude/settings.json. Those files are the local security guard under bypassPermissions, so edits must be reviewed — not silent. Add the 'hooks-change' label to acknowledge, then this check re-runs."
          exit 1

  # RLS coverage (static) — every table in the `public` schema must enable Row Level Security. RLS
  # is the multi-tenant boundary and the public anon key ships in the client bundle, so a public
  # table without RLS is open to anyone holding that key. Deterministic, no DB, no deps — runs on
  # every push + PR. Scans the migrations (scripts/check-rls.mjs). Promote to a required check once
  # it has reported on a few PRs.
  rls-static:
    name: RLS coverage (static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Assert every public table enables RLS (migration scan)
        run: node scripts/check-rls.mjs

  # RLS coverage (live DB) — applies the migrations to a real Supabase stack and asserts, against
  # the ACTUAL database, that every public table enforces RLS, that no policy is blanket-`true` for
  # anon/authenticated, and (end-to-end) that the public anon key cannot read an RLS-protected table
  # through PostgREST. Heavier (boots the local stack) so NOT required yet — promote once stable.
  # See scripts/check-rls-live.mjs.
  rls-live:
    name: RLS coverage (live DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Start local Supabase (applies all migrations)
        run: supabase start

      - name: Run the live RLS check against the running stack
        run: |
          set -euo pipefail
          source <(supabase status -o env)
          SUPABASE_DB_URL="$DB_URL" \
          SUPABASE_URL="$API_URL" \
          SUPABASE_ANON_KEY="$ANON_KEY" \
            node scripts/check-rls-live.mjs

      - name: Stop local Supabase
        if: always()
        run: supabase stop
