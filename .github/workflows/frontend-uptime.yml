name: Frontend uptime check

# The 2026-07-13 incident surfaced as a broken FRONTEND feature (schema skew) while the backend
# "Deploy (prod)" was green — and the frontend deploys via Vercel entirely OUTSIDE deploy.yml, so no
# existing workflow watches it. This synthetic check curls the prod site every ~15 min and, if it is
# unreachable or not serving the app shell, opens/updates a GitHub issue (assigning + @mentioning the
# owner, same as the other monitors). Catches: hard-down, provider error page, DNS/domain break,
# deleted project, Vercel outage.
#
# What it does NOT catch: a STALE-but-serving build (a failed Vercel BUILD keeps the last good deploy
# live, still HTTP 200). For that, enable Vercel's own deploy-failure notifications (Vercel → Project →
# Settings → Notifications); and schema skew (frontend ahead of a failed migration) is covered by the
# now-loud migrate failure in deploy.yml + deploy-failure-alert.yml. Between the three, the frontend
# failure surface is covered.

on:
  schedule:
    - cron: '7,22,37,52 * * * *' # ~every 15 min, off the top of the hour to dodge Actions load
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  uptime:
    name: Prod frontend reachable
    runs-on: ubuntu-latest
    steps:
      - name: Curl the prod site
        id: check
        env:
          # The prod origin (docs/INVENTORY.md). Public URL, so it's inlined rather than a secret.
          PROD_URL: https://todoclaw-psi.vercel.app
        run: |
          # Two failure classes: transport (non-200 / no response) and content (200 but not the app
          # shell — a provider error/placeholder page). Retry a few times so a single blip doesn't
          # page; only a sustained failure opens an issue. `<title>Todoclaw</title>` is the shell marker.
          code=""
          ok=false
          for attempt in 1 2 3; do
            resp=$(curl -sS --max-time 20 -w '\n%{http_code}' "$PROD_URL" || true)
            code=$(printf '%s' "$resp" | tail -n1)
            html=$(printf '%s' "$resp" | sed '$d')
            if [ "$code" = "200" ] && printf '%s' "$html" | grep -q '<title>Todoclaw</title>'; then
              ok=true
              break
            fi
            echo "attempt $attempt: HTTP ${code:-none}, app-shell marker missing"
            sleep 10
          done
          if [ "$ok" = true ]; then
            echo "prod frontend OK (HTTP 200 + app shell)"
            echo "down=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::prod frontend check failed (last HTTP ${code:-none})"
            echo "down=true" >> "$GITHUB_OUTPUT"
            echo "last_code=${code:-none}" >> "$GITHUB_OUTPUT"
          fi

      - name: Open/update an outage issue
        if: steps.check.outputs.down == 'true'
        uses: actions/github-script@v7
        env:
          PROD_URL: https://todoclaw-psi.vercel.app
          LAST_CODE: ${{ steps.check.outputs.last_code }}
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const title = '🚨 Production frontend is unreachable'
            const body = [
              `The synthetic uptime check could not load ${process.env.PROD_URL} (last HTTP \`${process.env.LAST_CODE || 'no response'}\`; app-shell marker missing).`,
              '',
              'The frontend is served by Vercel, OUTSIDE the Deploy (prod) workflow, so this is the only automated detector for it. Check the Vercel dashboard (latest deployment + build logs) and load the site directly.',
              '',
              // @mention + assign so this reaches the owner even under a "Participating and @mentions"
              // watch (see deploy-failure-alert.yml). Repeated on every comment so a sustained outage
              // keeps nudging.
              `cc @${owner} — the app is down for users.`,
            ].join('\n')
            const open = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 })
            const existing = open.data.find((i) => i.title === title && !i.pull_request)
            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body })
              core.info(`Updated #${existing.number}`)
            } else {
              const created = await github.rest.issues.create({ owner, repo, title, body, assignees: [owner] })
              core.info(`Opened #${created.data.number}`)
            }
