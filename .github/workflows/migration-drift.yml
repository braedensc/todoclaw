name: Migration drift check

# Daily read-only check that PROD has every migration the repo does. The 2026-07-09 incident sat
# unnoticed because the deploy failed AFTER merge (PR CI was green) and prod silently fell 5
# migrations behind. This is the standing monitor: it runs `db push --dry-run` (never writes) and
# opens/updates a GitHub issue the moment prod is behind. Complements deploy-failure-alert.yml —
# that catches the deploy erroring; this catches drift however it arises (a skipped migrate step, a
# manual DB change, a deploy that never ran).

on:
  schedule:
    - cron: '17 13 * * *' # daily 13:17 UTC — off the top of the hour to dodge Actions load
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    name: Check prod is up to date
    runs-on: ubuntu-latest
    steps:
      - name: Preflight — is the DB URL configured?
        id: pre
        env:
          SUPABASE_DB_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::warning::BACKUP_DATABASE_URL not set — skipping drift check."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.pre.outputs.configured == 'true'

      - uses: supabase/setup-cli@v2
        if: steps.pre.outputs.configured == 'true'
        with:
          version: 2.107.0

      # Read-only: --dry-run never writes. When prod is behind, the CLI prints "Would push these
      # migrations:" followed by each pending file; that phrase is the drift signal.
      - name: Detect unapplied migrations (dry-run)
        id: drift
        if: steps.pre.outputs.configured == 'true'
        env:
          SUPABASE_DB_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          out=$(supabase db push --db-url "$SUPABASE_DB_URL" --include-all --dry-run 2>&1) || true
          echo "$out"
          if printf '%s' "$out" | grep -q 'Would push these migrations:'; then
            pending=$(printf '%s\n' "$out" | grep -oE '[0-9]{14}_[A-Za-z0-9_]+\.sql' | sort -u)
            echo "drift=true" >> "$GITHUB_OUTPUT"
            {
              echo "pending<<PENDING_EOF"
              printf '%s\n' "$pending"
              echo "PENDING_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open/update a drift issue
        if: steps.pre.outputs.configured == 'true' && steps.drift.outputs.drift == 'true'
        uses: actions/github-script@v7
        env:
          PENDING: ${{ steps.drift.outputs.pending }}
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const title = '⚠️ Prod database is behind (unapplied migrations)'
            const pending = (process.env.PENDING || '').trim().split('\n').filter(Boolean)
            const body = [
              `The daily drift check found ${pending.length} migration(s) in the repo that are **not applied to prod**:`,
              '',
              ...pending.map((p) => `- \`${p}\``),
              '',
              'Prod is behind — usually a deploy that failed or was skipped. Check the latest **Deploy (prod)** run and its `migrate` job, then re-run it from `main` (Actions → Deploy (prod) → Run workflow) once the cause is fixed.',
            ].join('\n')
            const open = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 })
            const existing = open.data.find((i) => i.title === title && !i.pull_request)
            if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body })
              core.info(`Updated #${existing.number}`)
            } else {
              const created = await github.rest.issues.create({ owner, repo, title, body })
              core.info(`Opened #${created.data.number}`)
            }
