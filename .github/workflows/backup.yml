name: DB Backup

# Daily ENCRYPTED backup of the production `public` schema, stored as a GitHub
# Actions artifact (90-day retention). Authenticates as the least-privilege,
# read-only `backup_ro` role (see supabase/migrations/*_backup_role.sql) — never
# the service-role/superuser.
#
# Until the repo secrets BACKUP_DATABASE_URL + BACKUP_GPG_PASSPHRASE are set
# (docs/SERVICES.md), the job runs green but SKIPS. Trigger manually from the
# Actions tab (workflow_dispatch) to test once configured.

on:
  schedule:
    - cron: '0 9 * * *' # 09:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    name: Encrypted pg_dump → artifact
    runs-on: ubuntu-latest
    steps:
      - name: Preflight — are backup secrets configured?
        id: pre
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          BACKUP_GPG_PASSPHRASE: ${{ secrets.BACKUP_GPG_PASSPHRASE }}
        run: |
          if [ -z "$BACKUP_DATABASE_URL" ] || [ -z "$BACKUP_GPG_PASSPHRASE" ]; then
            echo "::notice::Backup secrets not set — skipping. Configure BACKUP_DATABASE_URL + BACKUP_GPG_PASSPHRASE to enable."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      # pg_dump must be >= the server's major version. Run it from a pinned Postgres
      # image so the runner's client version can't break the dump.
      - name: Dump public schema
        if: steps.pre.outputs.configured == 'true'
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          # Exclude the privacy-sensitive, HARD-deleted AI-meta tables: chat transcripts
          # (persistent-chats ADR) and assistant_memories (its 20260713030000 migration already
          # documents this exclusion — wiring it here closes that gap). Keeping them out of rotated
          # dumps honors "delete means delete" so a deleted chat/memory can't linger in an old backup.
          docker run --rm -e PGCONN="$BACKUP_DATABASE_URL" postgres:17-alpine \
            sh -c 'pg_dump "$PGCONN" --schema=public --no-owner --no-privileges \
              --exclude-table=public.chat_sessions --exclude-table=public.chat_messages \
              --exclude-table=public.assistant_memories' \
            > backup.sql
          echo "dump size: $(wc -c < backup.sql) bytes"
          test -s backup.sql || { echo "::error::empty dump"; exit 1; }

      - name: Encrypt (AES-256, symmetric)
        if: steps.pre.outputs.configured == 'true'
        env:
          BACKUP_GPG_PASSPHRASE: ${{ secrets.BACKUP_GPG_PASSPHRASE }}
        run: |
          gpg --batch --yes --passphrase "$BACKUP_GPG_PASSPHRASE" \
            --cipher-algo AES256 --symmetric -o backup.sql.gpg backup.sql
          rm -f backup.sql

      - name: Upload encrypted artifact
        if: steps.pre.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup.sql.gpg
          retention-days: 90
          if-no-files-found: error
